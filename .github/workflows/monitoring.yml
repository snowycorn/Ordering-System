name: Deploy Monitoring Stack (EC2-B)

# 只在 monitoring 設定變更時觸發，與服務部署 (ci.yml) 互不干擾；亦可手動觸發。
on:
  push:
    branches: [main]
    paths:
      - 'monitoring/**'
      - '.github/workflows/monitoring.yml'
  workflow_dispatch:

# 同一分支同時只跑一條，避免兩次 push 互相覆蓋。
concurrency:
  group: deploy-monitoring-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy monitoring stack to EC2-B
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_B_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_B_SSH_KEY }}
          script: |
            set -euo pipefail

            # ── 1. 確保 Docker + compose plugin 已安裝 ───────────────────────────
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker 未安裝，開始安裝..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker ubuntu || true
            fi
            if ! sudo docker compose version >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # ── 2. 取得最新程式碼（沿用既有 ~/app；首次則 clone） ───────────────
            if [ ! -d ~/app/.git ]; then
              git clone https://github.com/${{ github.repository }}.git ~/app
            fi
            cd ~/app
            git fetch origin main
            git checkout main
            git pull origin main

            cd ~/app/monitoring

            # ── 2.5 磁碟守門：清理 + 檢查可用空間（EC2-B 磁碟小，避免拉一半才爆）──
            sudo docker system prune -f || true
            AVAIL_KB=$(df --output=avail / | tail -1)
            echo "根分割區可用空間：$((AVAIL_KB/1024))MB"
            if [ "$AVAIL_KB" -lt 2097152 ]; then
              echo "❌ 根分割區可用空間 < 2G，請先擴大 EBS 或清理後重試"; exit 1
            fi

            # ── 3. 啟動中央 stack（Prometheus + Loki + Grafana）─────────────────
            #    Prometheus 的 scrape 目標走各服務私有 IP（已寫在 prometheus.yml）。
            sudo docker compose up -d --remove-orphans

            # ── 4. 啟動 PM2 版 Promtail（收 ~/.pm2/logs 的 NestJS JSON log）──────
            sudo docker compose -f promtail/docker-compose.promtail-pm2.yml up -d --remove-orphans

            # ── 5. 健康檢查 ──────────────────────────────────────────────────────
            #    輪詢重試：Loki /ready 在 ingester ready 後還會刻意等約 15 秒（ring
            #    穩定期）才回 200，期間回 503，故單次 curl 會誤判。最多等 ~60 秒。
            wait_ready() {
              local name="$1" url="$2" i
              for i in $(seq 1 30); do
                if curl -sf "$url" >/dev/null; then echo "✅ $name 就緒"; return 0; fi
                sleep 2
              done
              echo "❌ $name 未就緒（等待逾時）"; return 1
            }
            wait_ready Prometheus http://localhost:9090/-/healthy || exit 1
            # 熱重載 Prometheus 設定：docker compose up -d 不會重建「只有掛載檔案變」的
            # 容器，故 scrape target 改動需主動 reload（graceful、不中斷、不丟 TSDB）。
            curl -sf -X POST http://localhost:9090/-/reload && echo "✅ Prometheus 設定已重載"
            wait_ready Loki       http://localhost:3100/ready     || exit 1
            wait_ready Grafana    http://localhost:3000/api/health || exit 1
            echo "✅ Monitoring stack 部署完成（Prometheus :9090 / Loki :3100 / Grafana :3000）"
