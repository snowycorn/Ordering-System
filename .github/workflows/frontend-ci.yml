name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    name: Lint, Test Coverage & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --runInBand

      - name: Build Next.js
        run: npm run build
        env:
          IAM_URL: http://placeholder:8000/iam
          NOTIFICATION_URL: http://placeholder:8000/notification
          RECOMMENDATION_URL: http://placeholder:8000/recommendation
          BILLING_URL: http://placeholder:8000/billing
          APPEAL_URL: http://placeholder:8000/appeal-admin
          VENDOR_URL: http://placeholder:8000
          ORDER_URL: http://placeholder:8000
          USE_LOCAL_MOCKS: "false"
