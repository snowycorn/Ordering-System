name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read
  packages: write

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ordering-system-frontend

jobs:
  validate:
    name: Lint, Test Coverage & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --runInBand

      - name: Build Next.js
        run: npm run build
        env:
          IAM_URL: http://placeholder:8000/iam
          NOTIFICATION_URL: http://placeholder:8000/notification
          RECOMMENDATION_URL: http://placeholder:8000/recommendation
          BILLING_URL: http://placeholder:8000/billing
          APPEAL_URL: http://placeholder:8000/appeal-admin
          VENDOR_URL: http://placeholder:8000
          ORDER_URL: http://placeholder:8000
          USE_LOCAL_MOCKS: "false"

  docker:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy Frontend to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.FRONTEND_EC2_USER }}
          key: ${{ secrets.FRONTEND_EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

            docker stop frontend 2>/dev/null || true
            docker rm frontend 2>/dev/null || true

            docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e IAM_URL=${{ vars.FRONTEND_IAM_URL }} \
              -e NOTIFICATION_URL=${{ vars.FRONTEND_NOTIFICATION_URL }} \
              -e RECOMMENDATION_URL=${{ vars.FRONTEND_RECOMMENDATION_URL }} \
              -e BILLING_URL=${{ vars.FRONTEND_BILLING_URL }} \
              -e APPEAL_URL=${{ vars.FRONTEND_APPEAL_URL }} \
              -e VENDOR_URL=${{ vars.FRONTEND_VENDOR_URL }} \
              -e ORDER_URL=${{ vars.FRONTEND_ORDER_URL }} \
              -e AUTH_COOKIE_NAME=token \
              -e AUTH_ROLE_COOKIE_NAME=role \
              -e AUTH_COOKIE_MAX_AGE=28800 \
              -e USE_LOCAL_MOCKS=false \
              -e COOKIE_SECURE=false \
              -e NODE_ENV=production \
              ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

            docker ps --filter "name=frontend"
