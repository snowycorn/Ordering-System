name: Order Inventory CI/CD

on:
  push:
    branches: [main]
    paths:
      - "order-inventory-service/**"
      - ".github/workflows/order-inventory-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "order-inventory-service/**"
      - ".github/workflows/order-inventory-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: order-inventory-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/order-inventory-service

jobs:
  test:
    name: Docker Compose Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: order-inventory-service

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p reports

      - name: Run Docker test profile
        run: docker compose --profile test run --rm --build order-service-test

      - name: Upload pytest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-inventory-pytest-report
          path: order-inventory-service/reports/test-report.html
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-inventory-coverage-report
          path: |
            order-inventory-service/reports/coverage
            order-inventory-service/reports/coverage.xml
          if-no-files-found: ignore

      - name: Stop compose services
        if: always()
        run: docker compose --profile test down -v --remove-orphans

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push order inventory image
        uses: docker/build-push-action@v6
        with:
          context: order-inventory-service
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      EC2_HOST: ${{ secrets.ORDER_INVENTORY_EC2_HOST }}
      EC2_USER: ${{ secrets.ORDER_INVENTORY_EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.ORDER_INVENTORY_EC2_SSH_KEY }}
      EC2_PROJECT_DIR: ${{ secrets.ORDER_INVENTORY_EC2_PROJECT_DIR }}

    steps:
      - name: Skip deploy when EC2 secrets are missing
        if: env.EC2_HOST == '' || env.EC2_USER == '' || env.EC2_SSH_KEY == '' || env.EC2_PROJECT_DIR == ''
        run: echo "ORDER_INVENTORY_EC2_* secrets are not configured. Build completed, deployment skipped."

      - name: Deploy with Docker Compose
        if: env.EC2_HOST != '' && env.EC2_USER != '' && env.EC2_SSH_KEY != '' && env.EC2_PROJECT_DIR != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORDER_INVENTORY_EC2_HOST }}
          username: ${{ secrets.ORDER_INVENTORY_EC2_USER }}
          key: ${{ secrets.ORDER_INVENTORY_EC2_SSH_KEY }}
          port: ${{ secrets.ORDER_INVENTORY_EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            if [ ! -d "${{ secrets.ORDER_INVENTORY_EC2_PROJECT_DIR }}/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "${{ secrets.ORDER_INVENTORY_EC2_PROJECT_DIR }}"
            fi

            cd "${{ secrets.ORDER_INVENTORY_EC2_PROJECT_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cd order-inventory-service
            cat > .env << 'EOF'
            JWT_SECRET=${{ secrets.ORDER_INVENTORY_JWT_SECRET || secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.ORDER_INVENTORY_DATABASE_URL || secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.ORDER_INVENTORY_REDIS_URL || secrets.REDIS_URL }}
            RABBITMQ_URL=${{ secrets.ORDER_INVENTORY_RABBITMQ_URL || secrets.RABBITMQ_URL }}
            TEST_REPORT_DIR=${{ secrets.ORDER_INVENTORY_TEST_REPORT_DIR || './reports' }}
            NOTIFICATION_SERVICE_URL=${{ secrets.ORDER_INVENTORY_NOTIFICATION_SERVICE_URL || secrets.NOTIFICATION_SERVICE_URL }}
            MENU_SERVICE_URL=${{ secrets.ORDER_INVENTORY_MENU_SERVICE_URL || secrets.MENU_SERVICE_URL }}
            ADMIN_USER_ID=${{ secrets.ORDER_INVENTORY_ADMIN_USER_ID || secrets.ADMIN_USER_ID || '14' }}
            EOF
            chmod 600 .env

            docker compose up -d --build order-service
            docker compose ps order-service
